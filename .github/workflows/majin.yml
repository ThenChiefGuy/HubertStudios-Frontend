name: Find and Unzip

on:
  push:
    branches:
      - main # Triggers on push to main branch. Change if needed.
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  unzip-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip all .zip files to the root directory
        run: |
          # Finds all .zip files recursively and extracts them to the root directory (.)
          # The -o flag automatically overwrites existing files without prompting
          find . -type f -name "*.zip" -exec unzip -o {} -d . \;

      - name: Verify unzipped files (Optional debugging step)
        run: ls -la

      # =====================================================================
      # OPTIONAL: Uncomment the following step if you want to commit 
      # the newly unzipped files back to your GitHub repository.
