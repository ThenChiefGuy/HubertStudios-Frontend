name: Unzip to Root

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file to root
        run: |
          unzip -o your-file.zip -d .
          rm your-file.zip

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Unzip contents to root"
          file_pattern: "*"
