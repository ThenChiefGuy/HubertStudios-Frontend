name: Find and Unzip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List files before unzip
        run: |
          echo "=== Here is what is currently in the repo ==="
          find . -maxdepth 3 -not -path '*/.*'

      - name: Find and unzip all zip files
        run: |
          # -iname makes the search case-insensitive (.zip and .ZIP)
          # NOTE: If you want to flatten all files directly into the root (ignoring internal zip folders), 
          # change "unzip -o" to "unzip -oj" below.
          find . -type f -iname "*.zip" -exec unzip -o {} -d . \;

      - name: Debug - List files after unzip
        run: |
          echo "=== Here is the root directory after unzipping ==="
          ls -la
